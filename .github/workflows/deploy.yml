name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Разрешаем только один параллельный деплой
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Next.js (static export)
        run: bun run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NODE_ENV: "production"

      - name: Verify build output
        run: |
          if [ ! -d "out" ]; then
            echo "ERROR: out/ directory missing"
            exit 1
          fi
          if [ ! -f "out/index.html" ]; then
            echo "ERROR: out/index.html missing"
            exit 1
          fi
          # Добавляем .nojekyll, чтобы GitHub Pages не игнорировал _next/
          touch out/.nojekyll
          echo "Build OK. Files:"
          ls -la out/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
