name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Next.js (static export)
        run: bun run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Verify build output
        run: |
          if [ ! -d "out" ]; then
            echo "ERROR: out/ directory missing"
            exit 1
          fi
          if [ ! -f "out/index.html" ]; then
            echo "ERROR: out/index.html missing"
            exit 1
          fi
          echo "Build OK. Files:"
          ls -la out/

      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KRES_PORTFOLIO }}
          projectId: kres-portfolio
          channelId: live
          target: hosting
        continue-on-error: true # если секрет не настроен — пропустить деплой

      - name: Deploy Firestore rules
        if: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KRES_PORTFOLIO != '' }}
        uses: w9jds/firebase-action@v13.18.0
        with:
          args: deploy --only firestore:rules,firestore:indexes
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KRES_PORTFOLIO }}
          PROJECT_ID: kres-portfolio
